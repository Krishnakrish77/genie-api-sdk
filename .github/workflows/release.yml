name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish both packages after validation (requires protected environments and secrets)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.14" }
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: python -m pip install --upgrade pip build twine
      - name: Verify package versions match
        run: |
          python -c 'import json, tomllib; py=tomllib.load(open("python/pyproject.toml", "rb"))["project"]["version"]; ts=json.load(open("typescript/package.json"))["version"]; assert py == ts, f"Version mismatch: Python={py}, TypeScript={ts}"'
      - run: python -m build python && python -m twine check python/dist/*
      - run: npm ci && npm run check && npm test && npm pack --dry-run
        working-directory: typescript
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

  publish-python:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 26, registry-url: "https://registry.npmjs.org" }
      - run: npm ci && npm publish --provenance
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
